plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.guava:guava:23.0'
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'App'
}

tasks.register('display') {
    doLast {
        println 'Good Morning its a devops class'
    }
}
